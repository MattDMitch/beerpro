# Beer Pro — hostapd configuration
# AP interface: uap0 (virtual interface on top of wlan0)
# SSID: BeerPro-Setup (open network for first-boot WiFi configuration)

interface=uap0
driver=nl80211
ssid=BeerPro-Setup
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Open network — no password needed to connect for setup
wpa=0

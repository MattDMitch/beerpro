# Beer Pro — dnsmasq configuration
# Serves DHCP only on uap0 (the Beer Pro setup AP interface)

interface=uap0
bind-interfaces

# DHCP pool for phones connecting to BeerPro-Setup
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,24h

# Redirect ALL DNS queries to this device — captive portal behaviour
# This causes iOS/Android to pop up a "Sign in to network" prompt
address=/#/192.168.4.1

# Domain for convenience
domain=beerpro.local
